# Стек перевода для BookReader: LibreTranslate (только en, ru) + ASP.NET прокси.
# Запуск из этой папки: docker compose up -d
# Телефон в той же Wi‑Fi: базовый URL в приложении http://<LAN-IP-этого-ПК>:8080
#
# Офлайн: в папке лежат ОБА Argos-пакета en→ru и ru→en (~150+ МБ каждый). Одного translate-en_ru недостаточно:
# у LibreTranslate при <2 установленных пакетов каждый воркер Gunicorn лезет за моделями в сеть → IncompleteRead.
# Прокси стартует сразу после запуска контейнера LT (без ожидания healthy), иначе compose
# может долго ждать healthy. Если LT ещё поднимается, тест API может дать 502 — повторите через минуту.
# Смотреть прогресс: Watch-LibreTranslateLogs.ps1 или: docker compose logs -f libretranslate

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: bookreader-libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,ru
    # Без оригинального powercycle. Два .argosmodel рядом с compose (см. volumes). CRLF: sed в entrypoint compose.
    entrypoint:
      - /bin/bash
      - -c
      - "sed 's/\\r//g' < /app/scripts/libretranslate-entrypoint.sh > /app/scripts/_entry_lf.sh && chmod +x /app/scripts/_entry_lf.sh && exec /app/scripts/_entry_lf.sh"
    volumes:
      - ./libretranslate-entrypoint.sh:/app/scripts/libretranslate-entrypoint.sh:ro
      - ./translate-en_ru-1_9.argosmodel:/opt/translate-en_ru-1_9.argosmodel:ro
      - ./translate-ru_en-1_9.argosmodel:/opt/translate-ru_en-1_9.argosmodel:ro
    # Том НЕ вешаем на подпапку packages — иначе Permission denied на index.json (пользователь libretranslate ≠ root).
    # Модели живут в слое контейнера; после ручной установки см. Install-EnRu-Model.ps1.
    # Для статуса в docker ps (не блокирует прокси).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=15).read()\""]
      interval: 20s
      timeout: 20s
      retries: 60
      start_period: 900s

  translation-proxy:
    build:
      context: ../TranslationProxy
      dockerfile: Dockerfile
    container_name: bookreader-translation-proxy
    restart: unless-stopped
    depends_on:
      - libretranslate
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - LibreTranslate__BaseUrl=http://libretranslate:5000

networks:
  default:
    name: bookreader_translation_net
